version: "2"
run:
  timeout: 5m
  go: 1.26.2
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    depguard:
      rules:
        Main:
          allow:
            - $EXAMPLES
            - $HOME
            - $gostd
            - github.com/LarsArtmann/gogenfilter
            - github.com/fsnotify/fsnotify
            - github.com/larsartmann/go-filewatcher
            - golang.org/x/time
          files:
            - "!examples/"
    exhaustruct:
      exclude:
        - os/exec.Cmd
    forbidigo:
      forbid:
        - pattern: '^(fmt\.Print(|f|ln)|print|println)$'
          msg: "use slog or log.Logger instead of fmt.Print*"
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
    gomoddirectives:
      replace-allow-list:
        - github.com/LarsArtmann/gogenfilter
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
  exclusions:
    generated: lax
    rules:
      - path: ^examples/
        linters:
          - forbidigo
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  exclusions:
    generated: lax
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
